on:
  workflow_dispatch: 
    inputs:
      release:
        description: "Make a new GitHub/Zenodo release with this run?"
        required: true
        type: boolean

name: hpc_sub.yml

jobs:
  states:
    runs-on: matrix-concurrent
    steps:
      - run: | 
          mkdir ~/.ssh -p
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/private.key
          sudo chmod 600 ~/.ssh/private.key
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_HPC }}
          SSH_KNOWN_HOSTS: ${{ secrets.AUTH_HOSTS }}
      - run: echo $SEC_USER@$FHOST $SEC_USER@$SHOST
        env:
          SEC_USER: ${{ secrets.SECRET_USER}}
          FHOST: ${{ secrets.FIRST_HOST}}
          SHOST: ${{ secrets.SECOND_HOST}}
      - run: ssh -i ~/.ssh/private.key $SEC_USER@$FHOST hostname -i
        env:
          SEC_USER: ${{ secrets.SECRET_USER}}
          FHOST: ${{ secrets.FIRST_HOST}}
          SHOST: ${{ secrets.SECOND_HOST}}

